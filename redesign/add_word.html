    <main>
        <div class="card">
            <h1 class="card__title">Dodawanie słowa</h1>

            <form action="/word/new" method="post" class="form form--vertical">
                <div>
                    <label for="category_id">Wybierz kategorię:</label>
                    <select class="select" name="category_id" id="category_id">
                        <option>Siema</option>
                        <option>Pomidor</option>
                        <option>Zioła</option>
                    </select>
                </div>
                <input class="input input--primary" type="text" name="word_name" minlength="3" maxlength="100" placeholder="Wpisz słowo..."
                    pattern="[A-Za-zĄĆĘŁŃÓŚŹŻąćęłńóśźż \-]+" required>
                <button class="btn btn--primary" type="submit">Dodaj słowo</button>
            </form>

        </div>
